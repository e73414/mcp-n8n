version: '3.8'
services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: n8n
      POSTGRES_PASSWORD: Banpodon1
      POSTGRES_DB: n8n
    ports:
      - "5432:5432"
    restart: unless-stopped

  mcp-n8n:
    build: .
    ports:
      - "3000:3000"
    env_file: .env
    depends_on:
      - postgres
    restart: unless-stopped
